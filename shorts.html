    <script>
        (function () {
            var container = document.getElementById('shorts-container');
            var up = document.querySelector('.short-arrow-up');
            var down = document.querySelector('.short-arrow-down');
            if (!container || !up || !down) return;
            var cardHeight = container.querySelector('.short-card').offsetHeight;
            up.addEventListener('click', function () {
                container.scrollBy({ top: -cardHeight, behavior: 'smooth' });
            });
            down.addEventListener('click', function () {
                container.scrollBy({ top: cardHeight, behavior: 'smooth' });
            });
        })();
